<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial;
    color:white;
}

/* Login card */

.login-box{
    background:#020617;
    padding:40px;
    border-radius:12px;
    width:320px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
    border:1px solid #1e293b;
}

/* Title */

.login-box h2{
    text-align:center;
    margin-bottom:25px;
}

/* Inputs */

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #334155;
    background:#020617;
    color:white;
}

/* Button */

button{
    width:100%;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

/* Register link */

.register{
    text-align:center;
    margin-top:15px;
}

.register a{
    color:#60a5fa;
    text-decoration:none;
}

.register a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-box">

<h2>TradeX Login</h2>

<form method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="register">
<a href="/register">Create Account</a>
</div>

</div>

</body>
</html>
