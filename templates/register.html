<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
}

/* Card */

.register-card{
width:380px;
padding:40px;
border-radius:16px;
background:rgba(2,6,23,0.9);
border:1px solid #1e293b;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

/* Title */

.title{
text-align:center;
font-size:24px;
font-weight:600;
margin-bottom:8px;
color:#22c55e;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:25px;
}

/* Inputs */

.input-group{
margin-bottom:18px;
}

input{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #334155;
background:#020617;
color:white;
font-size:14px;
}

input:focus{
outline:none;
border-color:#22c55e;
}

/* Button */

button{
width:100%;
padding:14px;
background:#22c55e;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#16a34a;
transform:translateY(-1px);
}

/* Login link */

.login{
margin-top:20px;
text-align:center;
color:#94a3b8;
}

.login a{
color:#60a5fa;
text-decoration:none;
}

.login a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="register-card">

<div class="title">TradeX</div>
<div class="subtitle">Create your trading account</div>

<form method="post">

<div class="input-group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Register</button>

</form>

<div class="login">
Already have an account? <a href="/login">Login</a>
</div>

</div>

</body>
</html>
