<!DOCTYPE html>
<html>
<head>
<title>Option Strategies</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
background:#0f172a;
color:white;
}

/* Navbar */

nav{
background:#020617;
padding:15px 30px;
border-bottom:1px solid #1e293b;
}

nav a{
color:#cbd5f5;
text-decoration:none;
font-weight:500;
}

nav a:hover{
color:white;
}

/* Page container */

.container{
padding:40px;
}

/* Title */

h1{
margin-bottom:30px;
}

/* Strategy grid */

.strategy-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* Cards */

.card{
background:#020617;
padding:25px;
border-radius:12px;
border:1px solid #1e293b;
cursor:pointer;
transition:0.3s;
}

.card:hover{
background:#1e293b;
transform:translateY(-3px);
}

/* Button */

.create-btn{
margin-top:40px;
padding:14px 20px;
background:#22c55e;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.create-btn:hover{
background:#16a34a;
}

</style>

</head>

<body>

<nav>
<a href="/dashboard">← Back to Dashboard</a>
</nav>

<div class="container">

<h1>Option Strategies</h1>

<div class="strategy-grid">

<div class="card" onclick="location.href='/strategy/covered_call'">
Covered Call
</div>

<div class="card" onclick="location.href='/strategy/protective_put'">
Protective Put
</div>

<div class="card" onclick="location.href='/strategy/bull_call'">
Bull Call Spread
</div>

<div class="card" onclick="location.href='/strategy/bear_put'">
Bear Put Spread
</div>

<div class="card" onclick="location.href='/strategy/straddle'">
Straddle
</div>

<div class="card" onclick="location.href='/strategy/strangle'">
Strangle
</div>

<div class="card" onclick="location.href='/strategy/iron_condor'">
Iron Condor
</div>

</div>

<button class="create-btn" onclick="window.location.href='/strategy/builder'">
Create Your Own Strategy
</button>

</div>

</body>
</html>
