<!DOCTYPE html>
<html>
<head>
<title>My Strategies</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
background:#0f172a;
color:white;
padding:40px;
}

/* Title */

h2{
margin-bottom:20px;
}

/* Strategy container */

.strategy-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* Card */

.card{
background:#020617;
padding:20px;
border-radius:12px;
border:1px solid #1e293b;
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
background:#1e293b;
}

/* Strategy name */

.card strong{
font-size:18px;
}

/* JSON style */

pre{
background:#0f172a;
padding:10px;
border-radius:6px;
overflow:auto;
font-size:12px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>My Saved Strategies</h2>

<div class="strategy-list">

{% for strategy in strategies %}

<div class="card">

<strong>{{ strategy.name }}</strong>

<pre>{{ strategy.legs_data }}</pre>

</div>

{% else %}

<div class="card">
No strategies saved yet.
</div>

{% endfor %}

</div>

</body>
</html>
