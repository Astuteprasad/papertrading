<!DOCTYPE html>
<html>
<head>

<title>{{ name }} Strategy</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#0f172a;
    color:white;
}

nav{
    background:#020617;
    padding:14px 30px;
}

nav a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:bold;
}

.container{
    padding:40px;
}

.chart-box{
    background:#020617;
    padding:25px;
    border-radius:10px;
    margin-top:25px;
}

.metrics{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-top:25px;
}

.metric-card{
    background:#020617;
    padding:18px;
    border-radius:8px;
    border:1px solid #1e293b;
}

.metric-title{
    font-size:13px;
    color:#94a3b8;
}

.metric-value{
    font-size:20px;
    font-weight:bold;
    margin-top:5px;
}

#description{
    margin-top:15px;
    color:#cbd5f5;
}

canvas{
    margin-top:20px;
}

</style>

</head>

<body>

<nav>
<a href="/strategy">⬅ Back to Strategies</a>
</nav>

<div class="container">

<h1>{{ name.replace('_',' ').title() }}</h1>

<div id="description"></div>

<div class="metrics">

<div class="metric-card">
<div class="metric-title">Max Profit</div>
<div class="metric-value" id="maxProfit">--</div>
</div>

<div class="metric-card">
<div class="metric-title">Max Loss</div>
<div class="metric-value" id="maxLoss">--</div>
</div>

<div class="metric-card">
<div class="metric-title">Breakeven</div>
<div class="metric-value" id="breakeven">--</div>
</div>

<div class="metric-card">
<div class="metric-title">Market Outlook</div>
<div class="metric-value" id="outlook">--</div>
</div>

</div>


<div class="chart-box">

<h2>Strategy Payoff (Expiration)</h2>

<canvas id="payoffChart" height="120"></canvas>

</div>

</div>

<script>

let chart;


// =============================
// OPTION PAYOFF FUNCTIONS
// =============================

function callBuy(S,K,p){
return Math.max(0,S-K)-p
}

function callSell(S,K,p){
return p-Math.max(0,S-K)
}

function putBuy(S,K,p){
return Math.max(0,K-S)-p
}

function putSell(S,K,p){
return p-Math.max(0,K-S)
}



// =============================
// MAIN PAYOFF ENGINE
// =============================

function generatePayoff(strategy){

let labels=[]
let data=[]
let profits=[]

let strikeForLine=100
let breakeven=null
let outlook="Neutral"


for(let S=50;S<=150;S++){

let profit=0

if(strategy==="covered_call"){
profit=(S-100)+callSell(S,110,5)
strikeForLine=110
outlook="Mild Bullish"
}

else if(strategy==="protective_put"){
profit=(S-100)+putBuy(S,90,5)
strikeForLine=90
outlook="Bullish Protection"
}

else if(strategy==="bull_call"){
profit=callBuy(S,100,10)+callSell(S,110,5)
strikeForLine=100
outlook="Bullish"
}

else if(strategy==="bear_put"){
profit=putBuy(S,110,10)+putSell(S,100,5)
strikeForLine=110
outlook="Bearish"
}

else if(strategy==="straddle"){
profit=callBuy(S,100,10)+putBuy(S,100,10)
strikeForLine=100
outlook="High Volatility"
}

else if(strategy==="strangle"){
profit=callBuy(S,110,5)+putBuy(S,90,5)
strikeForLine=100
outlook="High Volatility"
}

else if(strategy==="iron_condor"){
profit=
putSell(S,95,5)+
putBuy(S,85,2)+
callSell(S,105,5)+
callBuy(S,115,2)
strikeForLine=100
outlook="Neutral"
}

labels.push(S)
data.push(profit)
profits.push(profit)

}



let maxProfit=Math.max(...profits)
let maxLoss=Math.min(...profits)


let breakevens=[]

for(let i=1;i<profits.length;i++){

if((profits[i-1]<0 && profits[i]>0) ||
   (profits[i-1]>0 && profits[i]<0)){

breakevens.push(labels[i])

}

}

if(breakevens.length>0){
breakeven=breakevens[0]
}



document.getElementById("maxProfit").innerText=maxProfit.toFixed(2)
document.getElementById("maxLoss").innerText=maxLoss.toFixed(2)
document.getElementById("breakeven").innerText=breakevens.join(", ")
document.getElementById("outlook").innerText=outlook


createChart(labels,data,strikeForLine,breakeven)

loadDescription(strategy)

}



// =============================
// CREATE CHART
// =============================

function createChart(labels,data,strike,breakeven){

const ctx=document.getElementById('payoffChart').getContext('2d')

chart=new Chart(ctx,{

type:'line',

data:{
labels:labels,

datasets:[{

label:'Profit / Loss',

data:data,

borderWidth:3,

pointRadius:0,

fill:true,

backgroundColor:ctx=>{
let y=ctx.chart.scales.y.getPixelForValue(0)
let gradient=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height)

gradient.addColorStop(0,"rgba(34,197,94,0.4)")
gradient.addColorStop(0.5,"rgba(34,197,94,0.1)")
gradient.addColorStop(0.5,"rgba(239,68,68,0.1)")
gradient.addColorStop(1,"rgba(239,68,68,0.4)")

return gradient
},

borderColor:"#38bdf8",

tension:0

}]

},

options:{

plugins:{

legend:{display:false},

annotation:{

annotations:{

strikeLine:{
type:'line',
xMin:strike,
xMax:strike,
borderColor:'#38bdf8',
borderWidth:2,
borderDash:[6,6],
label:{
enabled:true,
content:'Strike'
}
},

breakevenLine:breakeven?{

type:'line',
xMin:breakeven,
xMax:breakeven,
borderColor:'#22c55e',
borderWidth:2,
borderDash:[6,6],
label:{
enabled:true,
content:'Breakeven'
}

}:{},

zeroLine:{
type:'line',
yMin:0,
yMax:0,
borderColor:'#94a3b8',
borderWidth:1
}

}

}

},

scales:{

x:{
grid:{color:"#1e293b"},
title:{display:true,text:"Stock Price at Expiry"}
},

y:{
grid:{color:"#1e293b"},
title:{display:true,text:"Profit / Loss"}
}

}

}

})

}



// =============================
// DESCRIPTION
// =============================

function loadDescription(strategy){

let text=""

if(strategy==="covered_call"){
text="Hold stock and sell a call to earn premium."
}

else if(strategy==="protective_put"){
text="Buy a put to protect downside risk."
}

else if(strategy==="bull_call"){
text="Buy lower strike call and sell higher strike call."
}

else if(strategy==="bear_put"){
text="Bearish spread using put options."
}

else if(strategy==="straddle"){
text="Buy call and put expecting big move."
}

else if(strategy==="strangle"){
text="Lower cost volatility strategy."
}

else if(strategy==="iron_condor"){
text="Range bound strategy earning premium."
}

document.getElementById("description").innerHTML=
"<p>"+text+"</p>"

}



// INIT

generatePayoff("{{ name }}")

</script>

</body>
</html>
